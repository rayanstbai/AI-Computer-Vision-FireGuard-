<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireGuard AI Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { 
            background-color: #0d0f14;
            color: #e2e8f0; 
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }
        .glass-card {
            background-color: #1c212b;
            border: 1px solid #2d3748;
            border-radius: 12px;
            overflow: hidden;
        }
        .card-header {
            background-color: #13171e;
            border-bottom: 1px solid #2d3748;
            padding: 15px;
            font-weight: bold;
            color: #94a3b8;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .video-container { 
            background-color: #000000; 
            min-height: 400px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .log-terminal { 
            background-color: #050505; 
            font-family: monospace; 
            font-size: 14px;
            height: 480px; 
            overflow-y: auto; 
            padding: 15px; 
        }
        .log-warning { color: #f59e0b; margin-bottom: 5px; }
        .log-danger { color: #ef4444; font-weight: bold; margin-bottom: 5px; }
        .log-info { color: #38bdf8; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="m-0 text-danger" style="font-weight: bold;">🔥 FireGuard <span class="text-light">Command Center</span></h2>
        <div>
            <span class="badge bg-success px-3 py-2">SYSTEM ONLINE</span>
        </div>
    </div>
    
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="glass-card h-100">
                <div class="card-header">
                    <span>LIVE: Edge Inference Node 01</span>
                    <span class="text-success" style="font-size: 12px;">● REC</span>
                </div>
                <div class="video-container">
                    <img src="{{ url_for('video_feed') }}" width="100%" alt="Awaiting Video Stream...">
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="glass-card h-100">
                <div class="card-header">
                    Real-Time Telemetry Logs
                </div>
                <div class="log-terminal" id="logBox">
                    </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function fetchLogs() {
        try {
            const response = await fetch('/logs');
            const logs = await response.json();
            const logBox = document.getElementById('logBox');
            
            logBox.innerHTML = ''; 
            
            logs.forEach(log => {
                let colorClass = 'log-info';
                if (log.level === 'warning') colorClass = 'log-warning';
                if (log.level === 'danger') colorClass = 'log-danger';
                
                logBox.innerHTML += `<div class="${colorClass}">> [${log.time}] ${log.message}</div>`;
            });
        } catch (error) {
            console.error("Error fetching logs:", error);
        }
    }
    setInterval(fetchLogs, 1000);
    fetchLogs(); 
</script>

</body>
</html>
